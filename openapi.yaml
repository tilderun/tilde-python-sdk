        - name: subject_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # --- Policies ---
  /organizations/{organization}/policies:
    post:
      tags: [Policies]
      summary: Create an authorization policy
      operationId: createPolicy
      parameters:
        - $ref: '#/components/parameters/Organization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, policy_text]
              properties:
                name:
                  type: string
                description:
                  type: string
                policy_text:
                  type: string
                  description: Policy text (simple policy DSL)
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Policies]
      summary: List policies in the organization
      operationId: listPolicies
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/After'
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
