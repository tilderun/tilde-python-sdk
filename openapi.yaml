      tags: [Groups]
      summary: Get a group with its members and policy attachments
      operationId: getGroup
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/GroupID'
      responses:
        '200':
          description: Group with members and attachments
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupMember'
                  attachments:
                    type: array
                    items:
                      $ref: '#/components/schemas/AttachmentRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Groups]
      summary: Update a group's name or description
      operationId: updateGroup
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/GroupID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Updated group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Groups]
      summary: Delete a group
      operationId: deleteGroup
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/GroupID'
      responses:
        '204':
          description: Group deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/groups/{group_id}/members:
    post:
      tags: [Groups]
      summary: Add a member (user, group, role, or agent) to a group
      operationId: addGroupMember
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/GroupID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_type, subject_id]
