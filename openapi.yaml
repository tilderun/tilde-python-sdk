          description: Sandbox created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      tags: [Sandboxes]
      summary: List sandboxes for this repository
      operationId: listSandboxes
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: after
          in: query
          schema:
            type: string
        - name: amount
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Sandbox list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Sandbox'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}:
    get:
      tags: [Sandboxes]
      summary: Get sandbox details
      operationId: getSandbox
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: Sandbox details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Sandboxes]
      summary: Cancel a running sandbox
      operationId: cancelSandbox
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}/status:
    get:
      tags: [Sandboxes]
      summary: Get sandbox status summary
      operationId: getSandboxStatus
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: Status summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}/stdout:
    get:
      tags: [Sandboxes]
      summary: Stream sandbox stdout
      operationId: getSandboxStdout
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: Stdout stream
          content:
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Logs have been evicted

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}/stderr:
    get:
      tags: [Sandboxes]
      summary: Stream sandbox stderr
      operationId: getSandboxStderr
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: Stderr stream
          content:
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Logs have been evicted

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}/combined:
    get:
      tags: [Sandboxes]
      summary: Stream sandbox combined output
      description: >
        Interleaved stdout and stderr stream, in the order output was produced
        by the container (similar to terminal shell output).
      operationId: getSandboxCombined
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: Combined stdout+stderr stream
          content:
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Logs have been evicted

  /organizations/{organization}/repositories/{repository}/sandboxes/{sandbox_id}/terminal:
    get:
      tags: [Sandboxes]
      summary: Connect to interactive sandbox terminal
      description: >
        WebSocket endpoint for bidirectional terminal I/O with an interactive sandbox.
        Upgrades to a WebSocket connection using binary frames. Only available for
        sandboxes created with `interactive: true` that are in a non-terminal state.

        Binary frame protocol (first byte is frame type):
        - `0x00` (client→server): stdin data
        - `0x01` (server→client): stdout/stderr data (TTY-merged)
        - `0x02` (client→server): JSON resize `{"cols":N,"rows":N}`
        - `0x03` (server→client): JSON exit `{"exited":true,"exit_code":N}`
      operationId: getSandboxTerminal
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SandboxID'
      responses:
        '200':
          description: WebSocket upgrade successful (101 Switching Protocols)
        '400':
          description: Sandbox is not interactive
        '409':
          description: Terminal session unavailable (e.g., after crash recovery)
        '410':
          description: Sandbox has already finished

