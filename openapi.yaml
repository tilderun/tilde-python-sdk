openapi: 3.0.3
info:
  title: Tilde API
  description: Cloud data versioning service for heterogeneous sources.
  version: 1.0.0
  contact:
    name: Tilde
servers:
  - url: /api/v1

security:
  - BasicAuth: []
  - BearerAuth: []

paths:
  # --- Auth ---
  /auth/signup:
    post:
      tags: [Auth]
      summary: Create a new user account
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with username/email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  description: Username or email address
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful (sets session and CSRF cookies)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (clears session cookies)
      operationId: logout
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user and their organizations
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user with organization memberships
          content:
            application/json:
              schema:
                type: object
                required: [user, organizations]
                additionalProperties: false
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  organizations:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrgSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check-username:
    get:
      tags: [Auth]
      summary: Check if a username is available
      operationId: checkUsername
      security: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                required: [available]
                additionalProperties: false
                properties:
                  available:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/search-users:
    get:
      tags: [Auth]
      summary: Search users by username prefix
      operationId: searchUsers
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Username prefix to search for
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: object
                required: [results]
                additionalProperties: false
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [username, full_name]
                      additionalProperties: false
                      properties:
                        username:
                          type: string
                        full_name:
                          type: string

  /auth/emails:
    post:
      tags: [Auth]
      summary: Add an email address to the current user
      operationId: addEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Email added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Auth]
      summary: List email addresses for the current user
      operationId: listEmails
      responses:
        '200':
          description: Email list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserEmail'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/keys:
    post:
      tags: [Auth]
      summary: Generate a new API key
      operationId: createAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Human-readable name for the key
                description:
                  type: string
      responses:
        '201':
          description: API token created (token shown only once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APITokenCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Auth]
      summary: List API keys (no secrets)
      operationId: listAPIKeys
      responses:
        '200':
          description: API token list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/keys/{key_id}:
    delete:
      tags: [Auth]
      summary: Revoke an API key
      operationId: revokeAPIKey
      parameters:
        - $ref: '#/components/parameters/KeyID'
      responses:
        '204':
          description: Key revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # --- OAuth ---
  /auth/oauth/providers:
    get:
      tags: [Auth]
      summary: List enabled OAuth providers
      operationId: oauthProviders
      security: []
      responses:
        '200':
          description: List of enabled provider names
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: string
                      enum: [google, github]

  /auth/oauth/{provider}/authorize:
    get:
      tags: [Auth]
      summary: Start OAuth authorization flow
      operationId: oauthAuthorize
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
      responses:
        '302':
          description: Redirect to OAuth provider
          headers:
            Location:
              schema:
                type: string

  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth provider callback
      operationId: oauthCallback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to UI (login page on error, home on success, register/complete for new users)
          headers:
            Location:
              schema:
                type: string

  /auth/oauth/complete-registration:
    post:
      tags: [Auth]
      summary: Complete OAuth registration with username
      operationId: oauthCompleteRegistration
      security: []
      parameters:
        - name: X-OAuth-Nonce
          in: header
          required: true
          schema:
            type: string
          description: CSRF nonce matching the claim JWT's jti
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9_-]{1,38}$'
                company:
                  type: string
                invite_code:
                  type: string
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Invalid nonce or invite code required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/oauth/claim-info:
    get:
      tags: [Auth]
      summary: Get OAuth claim info from HttpOnly cookie
      operationId: oauthClaimInfo
      security: []
      responses:
        '200':
          description: Claim info for the pending OAuth registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
        '401':
          description: No valid OAuth claim cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # --- Device Authorization ---
  /auth/device/code:
    post:
      tags: [Auth]
      summary: Request a device authorization code
      operationId: deviceRequestCode
      security: []
      responses:
        '200':
          description: Device authorization code issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCodeResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/device/token:
    post:
      tags: [Auth]
      summary: Poll for device authorization token
      operationId: deviceToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTokenRequest'
      responses:
        '200':
          description: Token issued or authorization still pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/device/confirm:
    post:
      tags: [Auth]
      summary: Confirm a device authorization code
      operationId: deviceConfirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceConfirmRequest'
      responses:
        '200':
          description: Device authorization confirmed
          content:
            application/json:
              schema:
                type: object
                required: [status]
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [confirmed]
        '404':
          $ref: '#/components/responses/NotFound'

  # --- Cross-org repositories ---
  /repositories:
    get:
      tags: [Repositories]
      summary: List all repositories the user has access to across organizations
      operationId: listAllUserRepos
      responses:
        '200':
          description: Repository list with organization context
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/RepositoryWithOrg'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # --- Organizations ---
  /organizations:
    post:
      tags: [Organizations]
      summary: Create an organization
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Organizations]
      summary: List user's organizations
      operationId: listOrgs
      responses:
        '200':
          description: Org list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'

  /organizations/{organization}:
    get:
      tags: [Organizations]
      summary: Get organization details
      operationId: getOrg
      parameters:
        - $ref: '#/components/parameters/Organization'
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/members:
    get:
      tags: [Organizations]
      summary: List organization members
      operationId: listMembers
      parameters:
        - $ref: '#/components/parameters/Organization'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Membership'
    post:
      tags: [Organizations]
      summary: Add a member to the organization
      operationId: addMember
      parameters:
        - $ref: '#/components/parameters/Organization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201':
          description: Member added
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organization}/members/{user_id}:
    delete:
      tags: [Organizations]
      summary: Remove a member from the organization
      operationId: removeMember
      parameters:
        - $ref: '#/components/parameters/Organization'
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed
        '404':
          $ref: '#/components/responses/NotFound'

  # --- Repositories ---
  /organizations/{organization}/repositories:
    post:
      tags: [Repositories]
      summary: Create a repository
      operationId: createRepository
      parameters:
        - $ref: '#/components/parameters/Organization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepositoryRequest'
      responses:
        '201':
          description: Repository created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags: [Repositories]
      summary: List repositories
      operationId: listRepositories
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Repository list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Repository'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /organizations/{organization}/repositories/{repository}:
    get:
      tags: [Repositories]
      summary: Get repository details
      operationId: getRepository
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
      responses:
        '200':
          description: Repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Repositories]
      summary: Update a repository's settings
      operationId: updateRepository
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                visibility:
                  type: string
                  enum: [private, public]
                session_max_duration_days:
                  type: integer
                  description: Maximum number of days a session can remain open before cleanup. Must be less than retention_days.
                retention_days:
                  type: integer
                  description: Number of days of commit history to retain. Must be greater than session_max_duration_days.
      responses:
        '200':
          description: Updated repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Repositories]
      summary: Delete a repository (soft delete)
      operationId: deleteRepository
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
      responses:
        '204':
          description: Repository deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # --- Sessions ---
  /organizations/{organization}/repositories/{repository}/sessions:
    post:
      tags: [Sessions]
      summary: Create a new editing session
      operationId: createSession
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organization}/repositories/{repository}/sessions/{session_id}:
    post:
      tags: [Sessions]
      summary: Commit a session (applies staged changes)
      operationId: commitSession
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitSessionRequest'
      responses:
        '200':
          description: Session committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitSessionResponse'
        '202':
          description: Approval required (policy-based session taint detected for agent caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequiredResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Sessions]
      summary: Rollback a session (discard all staged changes)
      operationId: rollbackSession
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SessionID'
      responses:
        '204':
          description: Session rolled back
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/repositories/{repository}/sessions/{session_id}/approve:
    head:
      tags: [Sessions]
      summary: Check if a session is still pending approval
      description: >
        Lightweight polling endpoint for agents waiting on approval.
        Returns 200 if the session is still pending approval, 404 if
        it has been committed or rolled back.
      operationId: headSessionApproval
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: Session is still pending approval
        '404':
          description: Session has been committed or rolled back
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags: [Sessions]
      summary: Review session changes (for approval)
      operationId: getSessionChanges
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SessionID'
        - $ref: '#/components/parameters/Prefix'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Uncommitted changes in the session
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/EntryRecord'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Sessions]
      summary: Approve and commit a session
      operationId: approveSession
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitSessionRequest'
      responses:
        '200':
          description: Session approved and committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # --- Commits ---
  /organizations/{organization}/repositories/{repository}/commits/{commit_id}:
    get:
      tags: [Commits]
      summary: Get a commit
      operationId: getCommit
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: commit_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Commit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitLog'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/repositories/{repository}/commits/{commit_id}/revert:
    post:
      tags: [Commits]
      summary: Revert a commit
      description: >
        Creates a new commit on the repository's default branch that undoes the
        changes introduced by the specified commit. The target commit must have
        exactly one parent (root and merge commits are not supported).
      operationId: revertCommit
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: commit_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: >
                    Optional commit message. When omitted the server generates
                    'Revert "<original message>"'.
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional metadata to attach to the revert commit.
      responses:
        '201':
          description: Revert commit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  commit_id:
                    type: string
                required:
                  - commit_id
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organization}/repositories/{repository}/log:
    get:
      tags: [Commits]
      summary: Get commit log
      operationId: getLog
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: ref
          in: query
          required: false
          description: Tag name or commit ID (defaults to latest commit)
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          description: Filter to commits that modified any key starting with this prefix
          schema:
            type: string
        - name: object
          in: query
          required: false
          description: Filter to commits that modified this exact object key
          schema:
            type: string
        - name: amount
          in: query
          required: false
          description: Maximum number of commits to return (default 100, max 1000)
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Commit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommitLog'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # --- Diff ---
  /organizations/{organization}/repositories/{repository}/diff:
    get:
      tags: [Commits]
      summary: Diff between two refs
      operationId: diffRefs
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: left
          in: query
          required: true
          description: Left ref (commit ID)
          schema:
            type: string
        - name: right
          in: query
          required: true
          description: Right ref (commit ID)
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          schema:
            type: string
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: amount
          in: query
          required: false
          schema:
            type: integer
            default: 1000
        - name: delimiter
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Diff results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListingEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # --- Objects ---
  /organizations/{organization}/repositories/{repository}/object:
    get:
      tags: [Objects]
      summary: Get an object's content
      description: >
        Supports HTTP Range requests (single ranges only). When a valid Range
        header is present, the server returns 206 Partial Content with the
        requested byte range. This enables efficient partial reads of large
        files such as Parquet.
      operationId: getObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: false
          description: Session ID to read from (defaults to latest committed state)
          schema:
            type: string
            format: uuid
        - name: ref
          in: query
          required: false
          description: Reference (commit ID) to read from. Mutually exclusive with session_id.
          schema:
            type: string
        - $ref: '#/components/parameters/Path'
        - name: presign
          in: query
          required: false
          description: If true, return a 307 redirect to a presigned S3 GET URL instead of streaming the object
          schema:
            type: boolean
            default: false
        - name: Range
          in: header
          required: false
          description: 'HTTP byte range (e.g., "bytes=0-1023"). Only single ranges are supported.'
          schema:
            type: string
      responses:
        '200':
          description: Full object content (no Range header or Range not satisfiable)
          headers:
            ETag:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
            Content-Length:
              schema:
                type: integer
                format: int64
            X-Tilde-Meta-*:
              description: >
                User-defined metadata headers. Each key from the object's metadata
                map is returned as X-Tilde-Meta-<key>.
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request satisfied)
          headers:
            Content-Range:
              schema:
                type: string
                description: 'Byte range delivered, e.g. "bytes 0-1023/49152"'
            Content-Length:
              schema:
                type: integer
                format: int64
            ETag:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '307':
          description: Redirect to presigned S3 GET URL (when presign=true)
          headers:
            Location:
              schema:
                type: string
                format: uri
            Cache-Control:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '416':
          description: Range not satisfiable
          headers:
            Content-Range:
              schema:
                type: string
                description: 'Total size, e.g. "bytes */49152"'
    head:
      tags: [Objects]
      summary: Check object existence and metadata
      description: >
        Returns the same headers as GET /object (ETag, Content-Type,
        Content-Length) without streaming the body.
        Uses the GetObject authorization action.
      operationId: headObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: false
          description: Session ID to read from (defaults to latest committed state)
          schema:
            type: string
            format: uuid
        - name: ref
          in: query
          required: false
          description: Reference (commit ID) to read from. Mutually exclusive with session_id.
          schema:
            type: string
        - $ref: '#/components/parameters/Path'
      responses:
        '200':
          description: Object exists
          headers:
            ETag:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
                format: int64
            X-Tilde-Meta-*:
              description: >
                User-defined metadata headers. Each key from the object's metadata
                map is returned as X-Tilde-Meta-<key>.
              schema:
                type: string
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Objects]
      summary: Upload an object
      operationId: putObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the write into
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Path'
      description: >
        Upload an object. Set custom metadata via X-Tilde-Meta-<key> request headers.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Object uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  etag:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Objects]
      summary: Delete an object (stage tombstone)
      operationId: deleteObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the delete into
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Path'
      responses:
        '204':
          description: Object deleted
        '400':
          $ref: '#/components/responses/BadRequest'

  /organizations/{organization}/repositories/{repository}/object/copy:
    post:
      tags: [Objects]
      summary: Copy an object within a session
      description: >
        Copies a catalog entry from the source path to the destination path
        within the same session. The underlying data is not transferred; the
        destination entry references the same physical object. Use together
        with DELETE /object to implement rename.
      operationId: copyObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID for the copy operation
          schema:
            type: string
            format: uuid
        - name: source_path
          in: query
          required: true
          description: Path of the source object
          schema:
            type: string
        - name: destination_path
          in: query
          required: true
          description: Path for the destination object
          schema:
            type: string
      responses:
        '201':
          description: Object copied
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_path:
                    type: string
                  destination_path:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/repositories/{repository}/object/stage:
    post:
      tags: [Objects]
      summary: Stage a presigned upload (get an upload URL)
      description: >
        Returns a presigned S3 PUT URL, a physical address, and a signature.
        The client uploads directly to S3 using the upload URL, then calls
        PUT /object/finalize to record the object in the catalog.
      operationId: stageObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the write into
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Path'
      responses:
        '200':
          description: Presigned upload details
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StageObjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organization}/repositories/{repository}/object/finalize:
    put:
      tags: [Objects]
      summary: Finalize a presigned upload
      description: >
        After uploading to S3 using the URL from POST /object/stage,
        call this endpoint to verify the upload and record the object
        in the catalog.
      operationId: finalizeObject
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the write into
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Path'
        - name: expires_at
          in: query
          required: true
          description: Expiry timestamp from the stage response (RFC 3339)
          schema:
            type: string
            format: date-time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeObjectRequest'
      responses:
        '201':
          description: Object finalized
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeObjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organization}/repositories/{repository}/object/multipart:
    post:
      tags: [Objects]
      summary: Initiate a multipart upload
      description: >
        Creates a multipart upload in block storage and returns an upload handle
        with a signed token. The token must be passed to all subsequent multipart
        operations (part upload, complete, abort).
      operationId: initiateMultipartUpload
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the write into
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Path'
      responses:
        '201':
          description: Multipart upload initiated
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateMultipartUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '501':
          description: Multipart upload not supported by storage backend

  /organizations/{organization}/repositories/{repository}/object/multipart/part:
    get:
      tags: [Objects]
      summary: Get a presigned URL for uploading a part
      description: >
        Returns a 307 redirect to a presigned S3 URL for uploading a single part.
        The client should PUT the part data directly to the redirect URL.
      operationId: getPartPresignedURL
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: token
          in: query
          required: true
          description: Signed token from the initiate response
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: physical_address
          in: query
          required: true
          schema:
            type: string
        - name: upload_id
          in: query
          required: true
          schema:
            type: string
        - name: expires_at
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: part_number
          in: query
          required: true
          description: Part number (1-based, max 10000)
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        '307':
          description: Redirect to presigned upload URL
          headers:
            Location:
              description: Presigned S3 URL for uploading the part
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organization}/repositories/{repository}/object/multipart/complete:
    post:
      tags: [Objects]
      summary: Complete a multipart upload
      description: >
        Completes the multipart upload in S3 and stages the catalog entry
        in the given session. The total_size is authoritative (from client write tracking).
      operationId: completeMultipartUpload
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: token
          in: query
          required: true
          description: Signed token from the initiate response
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: physical_address
          in: query
          required: true
          schema:
            type: string
        - name: upload_id
          in: query
          required: true
          schema:
            type: string
        - name: expires_at
          in: query
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteMultipartUploadRequest'
      responses:
        '201':
          description: Upload completed and catalog entry staged
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteMultipartUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization}/repositories/{repository}/object/multipart/abort:
    post:
      tags: [Objects]
      summary: Abort a multipart upload
      description: >
        Aborts the multipart upload and cleans up any uploaded parts in S3.
      operationId: abortMultipartUpload
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: token
          in: query
          required: true
          description: Signed token from the initiate response
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: physical_address
          in: query
          required: true
          schema:
            type: string
        - name: upload_id
          in: query
          required: true
          schema:
            type: string
        - name: expires_at
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Multipart upload aborted
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organization}/repositories/{repository}/objects:
    get:
      tags: [Objects]
      summary: List objects
      operationId: listObjects
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: false
          description: Session ID to list from (defaults to latest committed state)
          schema:
            type: string
            format: uuid
        - name: ref
          in: query
          required: false
          description: Reference (commit ID) to list from. Mutually exclusive with session_id.
          schema:
            type: string
        - $ref: '#/components/parameters/Prefix'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Amount'
        - name: delimiter
          in: query
          required: false
          description: 'Delimiter for directory grouping (e.g., "/")'
          schema:
            type: string
      responses:
        '200':
          description: Object listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListingEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /organizations/{organization}/repositories/{repository}/objects/delete:
    post:
      tags: [Objects]
      summary: Delete multiple objects (stage tombstones)
      operationId: deleteObjects
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to stage the deletes into
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteObjectsRequest'
      responses:
        '200':
          description: Delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteObjectsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # --- Uncommitted Changes ---
  /organizations/{organization}/repositories/{repository}/changes:
    get:
      tags: [Sessions]
      summary: List uncommitted changes in a session
      operationId: listUncommittedChanges
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/Repository'
        - name: session_id
          in: query
          required: true
          description: Session ID to list changes for
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Prefix'
        - $ref: '#/components/parameters/After'
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Uncommitted changes
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/EntryRecord'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  # --- Groups ---
  /organizations/{organization}/groups:
    post:
      tags: [Groups]
      summary: Create a group
      operationId: createGroup
      parameters:
        - $ref: '#/components/parameters/Organization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Groups]
      summary: List groups in the organization
      operationId: listGroups
      parameters:
        - $ref: '#/components/parameters/Organization'
        - $ref: '#/components/parameters/After'
      responses:
        '200':
          description: Group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{organization}/groups/{group_id}:
