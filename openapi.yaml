components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: Email and password authentication
    BearerAuth:
      type: http
      scheme: bearer
      description: 'API token authentication: pass the opaque token as a Bearer token'

  parameters:
    Organization:
      name: organization
      in: path
      required: true
      description: Organization slug
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{1,62}$'
    Repository:
      name: repository
      in: path
      required: true
      description: Repository name
      schema:
        type: string
    SessionID:
      name: session_id
      in: path
      required: true
      description: Session ID
      schema:
        type: string
        format: uuid
    KeyID:
      name: key_id
      in: path
      required: true
      schema:
        type: string
    ConnectorID:
      name: connector_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GroupID:
      name: group_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyID:
      name: policy_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleName:
      name: role_name
      in: path
      required: true
      description: Role name
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{1,62}$'
    AgentName:
      name: agent_name
      in: path
      required: true
      description: Agent name
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{1,62}$'
    Path:
      name: path
      in: query
      required: true
      description: Object path (URL-encoded, no leading /)
      schema:
        type: string
    Prefix:
      name: prefix
      in: query
      required: false
      description: Filter by key prefix
      schema:
        type: string
    After:
      name: after
      in: query
      required: false
      description: Pagination cursor (return results after this value)
      schema:
        type: string
    Amount:
      name: amount
      in: query
      required: false
      description: Number of results per page (default 100, max 1000)
      schema:
        type: integer
        default: 100
        maximum: 1000
    SandboxID:
      name: sandbox_id
      in: path
      required: true
      description: Sandbox ID (same as session ID)
      schema:
        type: string
        format: uuid
    SecretKey:
      name: secret_key
      in: path
      required: true
      description: Secret key name
      schema:
        type: string
        pattern: '^[A-Za-z_][A-Za-z0-9_-]{0,255}$'

  schemas:
    Error:
      type: object
      required: [message, code, request_id]
      additionalProperties: false
      properties:
        message:
          type: string
        code:
          type: string
        request_id:
          type: string

    Pagination:
      type: object
      properties:
        has_more:
          type: boolean
        next_offset:
          type: string
        max_per_page:
          type: integer

    # --- Auth ---
    SignupRequest:
      type: object
      required: [username, email, full_name, password]
      additionalProperties: false
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        company:
          type: string
        invite_code:
          type: string
          description: Hex-encoded HMAC-SHA256 invite token (required when server is in invite-only mode)

    DeviceCodeResponse:
      type: object
      required: [device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval]
      additionalProperties: false
      properties:
        device_code:
          type: string
          description: The device verification code
        user_code:
          type: string
          description: The end-user verification code
        verification_uri:
          type: string
          description: The end-user verification URI
        verification_uri_complete:
          type: string
          description: Verification URI with the user code pre-filled
        expires_in:
          type: integer
          description: Lifetime in seconds of the device code
        interval:
          type: integer
          description: Minimum polling interval in seconds

    DeviceTokenRequest:
      type: object
      required: [device_code]
      additionalProperties: false
      properties:
        device_code:
          type: string
          description: The device verification code to poll

    DeviceConfirmRequest:
      type: object
      required: [user_code]
      additionalProperties: false
      properties:
        user_code:
          type: string
          description: The end-user verification code to confirm

    DeviceTokenResponse:
      type: object
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: The access token, present when authorization is complete
        error:
          type: string
          enum: [authorization_pending, slow_down]
          description: Error code when the authorization is not yet complete

    User:
      type: object
      required: [id, username, email, full_name, source, created_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
        company:
          type: string
        source:
          type: string
        created_at:
          type: string
          format: date-time

    APIToken:
      type: object
      required: [id, user_id, name, description, token_hint, created_at]
      additionalProperties: false
      properties:
        id:
          type: string
          description: Opaque key identifier for management operations — this is not the token
        user_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        token_hint:
          type: string
          description: Last 4 characters of the token for identification
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true

    APITokenCreated:
      type: object
      required: [token, id, name, description]
      additionalProperties: false
      properties:
        token:
          type: string
          description: Full API token, shown only at creation time. Use as Bearer token in the Authorization header.
        id:
          type: string
          description: Key identifier for management operations (listing, revocation)
        name:
          type: string
        description:
          type: string

    UserEmail:
      type: object
      required: [id, user_id, email, is_primary, verified, created_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        is_primary:
          type: boolean
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    # --- Organizations ---
    CreateOrgRequest:
      type: object
      required: [name, display_name]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,62}$'
        display_name:
          type: string

    Organization:
      type: object
      required: [id, name, display_name, created_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time

    Membership:
      type: object
      required: [organization_id, user_id, joined_at]
      additionalProperties: false
      properties:
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
        joined_at:
          type: string
          format: date-time

    AddMemberRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string

    OrgSummary:
      type: object
      required: [id, name, display_name]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string

    # --- Repositories ---
    CreateRepositoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, public]
          default: private
        session_max_duration_days:
          type: integer
          description: Maximum number of days a session can remain open before cleanup (default 7). Must be less than retention_days.
        retention_days:
          type: integer
          description: Number of days of commit history to retain (default 14). Must be greater than session_max_duration_days.

    Repository:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
        session_max_duration_days:
          type: integer
          description: Maximum number of days a session can remain open before cleanup
        retention_days:
          type: integer
          description: Number of days of commit history to retain
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    RepositoryWithOrg:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
        created_at:
          type: string
          format: date-time
        organization_slug:
          type: string
        organization_display_name:
          type: string

    # --- Sessions ---
    CreateSessionResponse:
      type: object
      required: [session_id]
      additionalProperties: false
      properties:
        session_id:
          type: string
          format: uuid

    CommitSessionRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string

    CommitSessionResponse:
      type: object
      required: [commit_id]
      additionalProperties: false
      properties:
        commit_id:
          type: string

    ApprovalRequiredResponse:
      type: object
      required: [approval_required, session_id, message, api_url, web_url]
      properties:
        approval_required:
          type: boolean
        session_id:
          type: string
          format: uuid
        message:
          type: string
        api_url:
          type: string
          description: API endpoint for the approval page
        web_url:
          type: string
          description: Browser URL for the approval page

    # --- Commits ---
    CommitLog:
      type: object
      properties:
        id:
          type: string
        committer:
          type: string
        committer_type:
          type: string
          description: Principal type of the committer (empty for pre-migration commits)
          enum: [user, role, agent]
        committer_id:
          type: string
          format: uuid
          description: UUID of the committer principal (empty for pre-migration commits)
        message:
          type: string
        meta_range_id:
          type: string
        creation_date:
          type: string
          format: date-time
        parents:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        object_count:
          type: integer
          format: int64
          description: Total number of objects in the committed snapshot
        total_size:
          type: integer
          format: int64
          description: Total size in bytes of all objects in the committed snapshot
        is_stale:
          type: boolean
          description: Whether this commit is beyond the repository's retention period. Objects from stale commits cannot be listed or read.

    # --- Objects ---
    ListingEntry:
      type: object
      required: [path, type]
      properties:
        path:
          type: string
        type:
          type: string
          enum: [object, prefix]
        entry:
          $ref: '#/components/schemas/Entry'
          description: Present when type is "object"
        status:
          type: string
          enum: [added, modified, removed]
          description: Diff status for uncommitted changes

    EntryRecord:
      type: object
      properties:
        path:
          type: string
        entry:
          $ref: '#/components/schemas/Entry'

    Entry:
      type: object
      properties:
        address:
          type: string
        last_modified:
          type: string
          format: date-time
        size:
          type: integer
          format: int64
        e_tag:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        address_type:
          type: integer
          description: '1=relative (uploaded), 2=full (imported)'
        content_type:
          type: string
        source_metadata:
          $ref: '#/components/schemas/SourceMetadata'

    SourceMetadata:
      type: object
      properties:
        connector_id:
          type: string
        connector_type:
          type: string
        source_path:
          type: string
        version_id:
          type: string
        source_etag:
          type: string
        import_time:
          type: string
          format: date-time
        import_job_id:
          type: string

    # --- Presigned Uploads ---
    StageObjectResponse:
      type: object
      required: [upload_url, physical_address, signature, expires_at]
      additionalProperties: false
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned S3 PUT URL for direct upload
        physical_address:
          type: string
          description: Physical address of the object in block storage
        signature:
          type: string
          description: HMAC signature to pass to the finalize endpoint
        expires_at:
          type: string
          format: date-time
          description: When the upload URL and signature expire

    FinalizeObjectRequest:
      type: object
      required: [physical_address, signature]
      additionalProperties: false
      properties:
        physical_address:
          type: string
          description: Physical address returned by the stage endpoint
        signature:
          type: string
          description: HMAC signature returned by the stage endpoint
        content_type:
          type: string
          description: Content type of the uploaded object (optional)
        metadata:
          type: object
          additionalProperties:
            type: string
          description: User-defined metadata key-value pairs to store with the object

    FinalizeObjectResponse:
      type: object
      required: [path, etag]
      additionalProperties: false
      properties:
        path:
          type: string
        etag:
          type: string

    InitiateMultipartUploadResponse:
      type: object
      required: [upload_id, physical_address, token, expires_at]
      additionalProperties: false
      properties:
        upload_id:
          type: string
          description: S3 multipart upload ID
        physical_address:
          type: string
          description: Physical address of the object in block storage
        token:
          type: string
          description: HMAC-signed token binding this upload to a specific context
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the token expires

    CompleteMultipartUploadRequest:
      type: object
      required: [parts, total_size]
      additionalProperties: false
      properties:
        parts:
          type: array
          items:
            $ref: '#/components/schemas/CompletedPart'
          minItems: 1
          description: List of completed parts with their part numbers and ETags
        content_type:
          type: string
          description: Content type of the uploaded object (defaults to application/octet-stream)
        total_size:
          type: integer
          format: int64
          description: Total size in bytes (authoritative, from client write tracking)
        metadata:
          type: object
          additionalProperties:
            type: string
          description: User-defined metadata key-value pairs to store with the object

    CompletedPart:
      type: object
      required: [part_number, etag]
      additionalProperties: false
      properties:
        part_number:
          type: integer
          minimum: 1
          maximum: 10000
        etag:
          type: string

    CompleteMultipartUploadResponse:
      type: object
      required: [path, etag]
      additionalProperties: false
      properties:
        path:
          type: string
        etag:
          type: string

    DeleteObjectsRequest:
      type: object
      required: [paths]
      additionalProperties: false
      properties:
        paths:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 1000
          description: List of object paths to delete (max 1000)

    DeleteObjectsResponse:
      type: object
      properties:
        deleted:
          type: integer
          description: Number of objects successfully deleted

    # --- Roles ---
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_by_name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true

    # --- Agents ---
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        inline_policy:
          type: string
          description: Policy source evaluated inline for this agent
        inline_policy_updated_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last inline policy update
        created_by_type:
          type: string
          enum: [user, role]
        created_by:
          type: string
          format: uuid
        created_by_name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true

    # --- Groups ---
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    GroupMember:
      type: object
      properties:
        subject_type:
          type: string
          enum: [user, group, role, agent]
        subject_id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
        added_at:
          type: string
          format: date-time

    # --- Policies ---
    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        policy_text:
          type: string
        is_builtin:
          type: boolean
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PolicySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_builtin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attachment_count:
          type: integer

    AttachmentRecord:
      type: object
      properties:
        policy_id:
          type: string
          format: uuid
        policy_name:
          type: string
        is_builtin:
          type: boolean
        principal_type:
          type: string
          enum: [user, group, role, agent]
        principal_id:
          type: string
          format: uuid
        principal_name:
          type: string
        attached_by_type:
          type: string
          enum: [user, role, agent]
        attached_by:
          type: string
          format: uuid
        attached_at:
          type: string
          format: date-time

    EffectiveGroup:
      type: object
      properties:
        group_id:
          type: string
          format: uuid
        group_name:
          type: string
        description:
          type: string
        source:
          type: string
          enum: [direct, group]
        source_name:
          type: string
          description: Parent group name when source is "group"

    EffectivePolicy:
      type: object
      properties:
        policy_id:
          type: string
          format: uuid
        policy_name:
          type: string
        is_builtin:
          type: boolean
        source:
          type: string
          enum: [direct, group]
        source_name:
          type: string
          description: Group name when source is "group"

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      properties:
        line:
          type: integer
        column:
          type: integer
        message:
          type: string

    # --- Connectors ---
    CreateConnectorRequest:
      type: object
      required: [name, type, source_uri, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [s3, gcs, git]
        source_uri:
          type: string
          description: 'Source URI (e.g., s3://bucket/prefix/ or gs://bucket/prefix/)'
        config:
          type: object
          description: Connector-specific config (e.g., S3 credentials)

    ConnectorInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        source_uri:
          type: string
        disabled:
          type: boolean
        public_key:
          type: string
          nullable: true
          description: >-
            SSH public key (Ed25519). Present only for git connectors.
            Add as a read-only deploy key in your Git repository settings.
        created_at:
          type: string
          format: date-time

    TestConnectorConfigRequest:
      type: object
      required: [type, source_uri, config]
      properties:
        type:
          type: string
          enum: [s3, gcs, git]
        source_uri:
          type: string
        config:
          type: object
          description: Connector-specific config

    TestConnectionResult:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    # --- Import ---
    StartImportRequest:
      type: object
      required: [destination_path]
      description: >
        Exactly one of `connector_id` or (`source_organization` + `source_repository`) must be provided.
      properties:
        connector_id:
          type: string
          format: uuid
          description: >
            Connector ID to import from. Mutually exclusive with
            source_organization/source_repository.
        source_organization:
          type: string
          description: >
            Source organization slug for cross-repository import.
            Required together with source_repository; mutually exclusive with connector_id.
        source_repository:
          type: string
          description: >
            Source repository name for cross-repository import.
            Required together with source_organization; mutually exclusive with connector_id.
        destination_path:
          type: string
          description: Destination path prefix in the repository
        source_prefix:
          type: string
          description: Optional sub-path to filter which objects are imported
        commit_message:
          type: string

    ImportJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        connector_id:
          type: string
          format: uuid
          nullable: true
        source_repository_id:
          type: string
          format: uuid
          nullable: true
        source_organization:
          type: string
          description: Display-only field populated for cross-repository imports
        source_repository:
          type: string
          description: Display-only field populated for cross-repository imports
        destination_path:
          type: string
        source_prefix:
          type: string
        commit_message:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, canceled]
        objects_imported:
          type: integer
          format: int64
        commit_id:
          type: string
        error:
          type: string
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSandboxRequest:
      type: object
      required: [image]
      properties:
        image:
          type: string
          description: Docker image to run
        command:
          type: array
          items:
            type: string
          description: Command to execute in the container
        mountpoint:
          type: string
          default: /sandbox
          description: Path inside the container where data is mounted
        path_prefix:
          type: string
          default: ''
          description: Path prefix within the repository to mount
        timeout_seconds:
          type: integer
          minimum: 1
          description: Maximum execution time in seconds. Cannot exceed repository session max duration.
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables for the container
        run_as:
          type: object
          description: Run the sandbox as a different principal (agent or role). Not allowed with interactive mode.
          properties:
            type:
              type: string
              enum: [agent, role]
              description: Principal type to run as
            id:
              type: string
              format: uuid
              description: UUID of the agent or role
          required: [type, id]
        interactive:
          type: boolean
          default: false
          description: >
            Enable interactive terminal mode. When true, the sandbox allocates a TTY and
            exposes a WebSocket endpoint for bidirectional terminal I/O. The command defaults
            to /bin/sh if not specified. Cannot be used with run_as.

    Sandbox:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        image:
          type: string
        command:
          type: array
          items:
            type: string
        mountpoint:
          type: string
        path_prefix:
          type: string
        timeout_seconds:
          type: integer
          nullable: true
        interactive:
          type: boolean
          description: Whether the sandbox is an interactive terminal session
        env_vars:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: [starting, running, committed, awaiting_approval, failed, cancelled]
        status_reason:
          type: string
        error_message:
          type: string
        exit_code:
          type: integer
          nullable: true
        commit_id:
          type: string
        web_url:
          type: string
        volume_name:
          type: string
        container_id:
          type: string
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true

    SandboxStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [starting, running, committed, awaiting_approval, failed, cancelled]
        status_reason:
          type: string
        exit_code:
          type: integer
          nullable: true
        commit_id:
          type: string
        web_url:
          type: string

    PutSecretRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          minLength: 1
          description: The secret value (UTF-8 string). Server limits total request body to 64 KiB.

    SecretListEntry:
      type: object
      properties:
        key:
          type: string
        created_by_type:
          type: string
          enum: [user, role, agent]
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SecretValueResponse:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    SandboxTriggerCondition:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [prefix, path_exact]
        prefix:
          type: string
          description: Prefix to match (for prefix type)
        path:
          type: string
          description: Exact path to match (for path_exact type)
        diff_type:
          type: string
          enum: [any, added, removed, changed]
          default: any
          description: Diff type filter (for path_exact type)

    SandboxTriggerConfig:
      type: object
      required: [image]
      properties:
        image:
          type: string
        command:
          type: array
          items:
            type: string
        mountpoint:
          type: string
        path_prefix:
          type: string
        timeout_seconds:
          type: integer
          minimum: 1
        env_vars:
          type: object
          additionalProperties:
            type: string

    SandboxTrigger:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/SandboxTriggerCondition'
        sandbox_config:
          $ref: '#/components/schemas/SandboxTriggerConfig'
        run_as:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum: [agent, role]
            id:
              type: string
              format: uuid
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSandboxTriggerRequest:
      type: object
      required: [name, conditions, sandbox_config]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/SandboxTriggerCondition'
          minItems: 1
          maxItems: 10
        sandbox_config:
          $ref: '#/components/schemas/SandboxTriggerConfig'
        run_as:
          type: object
          properties:
            type:
              type: string
              enum: [agent, role]
            id:
              type: string
              format: uuid
          required: [type, id]
        enabled:
          type: boolean
          default: true

    UpdateSandboxTriggerRequest:
      type: object
      required: [name, conditions, sandbox_config]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/SandboxTriggerCondition'
          minItems: 1
          maxItems: 10
        sandbox_config:
          $ref: '#/components/schemas/SandboxTriggerConfig'
        run_as:
          type: object
          properties:
            type:
              type: string
              enum: [agent, role]
            id:
              type: string
              format: uuid
          required: [type, id]

    PatchSandboxTriggerRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    SandboxTriggerRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        trigger_id:
          type: string
          format: uuid
        commit_id:
          type: string
        status:
          type: string
          enum: [pending, created, skipped, failed]
        reason:
          type: string
          description: Machine-readable reason (populated for skipped/failed runs)
        sandbox_id:
          type: string
          format: uuid
          nullable: true
          description: Sandbox ID if a sandbox was created
        matched_paths:
          type: array
          items:
            type: string
          description: Paths or prefixes that matched the trigger conditions
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: Upstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Service not configured or temporarily unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
